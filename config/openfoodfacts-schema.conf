# Shared OpenFoodFacts schema for Scala data mart and Python jobs
meta_columns=product_code,product_name,brands
model_meta_columns=product_name,brands
feature_columns=energy_kcal_100g,fat_100g,carbohydrates_100g,sugars_100g,proteins_100g,salt_100g
numeric_mappings=energy-kcal_100g:energy_kcal_100g,fat_100g:fat_100g,carbohydrates_100g:carbohydrates_100g,sugars_100g:sugars_100g,proteins_100g:proteins_100g,salt_100g:salt_100g
range.energy_kcal_100g=0:1000
range.fat_100g=0:100
range.carbohydrates_100g=0:100
range.sugars_100g=0:100
range.proteins_100g=0:100
range.salt_100g=0:20

