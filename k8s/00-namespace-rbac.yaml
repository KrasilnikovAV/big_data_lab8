apiVersion: v1
kind: Namespace
metadata:
  name: big-data-lab8
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: big-data-lab8
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-driver
  namespace: big-data-lab8
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["create", "get", "list", "watch", "delete", "deletecollection", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-driver
  namespace: big-data-lab8
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: big-data-lab8
roleRef:
  kind: Role
  name: spark-driver
  apiGroup: rbac.authorization.k8s.io
